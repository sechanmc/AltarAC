# \u00BB es » (doble >>), ANSI y UTF-8 interpreta esto diferente... puede que incluso veas "?" debido a esto.
prefix: "<gray>[<gradient:#FB0000:#FF874C><b>AltarAC</gradient><gray>]"

alerts-enabled: "%prefix% &fAlertas habilitadas"
alerts-disabled: "%prefix% &fAlertas deshabilitadas"
verbose-enabled: "%prefix% &fVerbose enabled"
verbose-disabled: "%prefix% &fVerbose disabled"
brands-enabled: "%prefix% &fBrands enabled"
brands-disabled: "%prefix% &fBrands disabled"
client-brand-format: "%prefix% &f%player% se ha unido usando %brand%"
console-specify-target: "%prefix% &c¡Debes especificar a alguien siendo la consola!"
reloading: "%prefix% &7Reloading config..."
reloaded: "%prefix% &fConfig has been reloaded."
reload-failed: "%prefix% &cFailed to reload config."
player-not-found: "%prefix% &c¡El jugador esta excluido o fuera de linea!"
player-not-this-server: "%prefix% &c¡El jugador no esta en este servidor!"
sender-not-found: "%prefix% &c¡No puedes usar este comando si estás exento!"
spectate-return: "<click:run_command:/AltarAC stopspectating><hover:show_text:\"/AltarAC stopspectating\">\n%prefix% &fClick aquí para volver a la localización previa\n</hover></click>"
cannot-spectate-return: "%prefix% &cSolo puedes hacer esto despues de espectar a un jugador"
cannot-run-on-self: "%prefix% &cNo puedes usar este comando en ti mismo!"
upload-log: "%prefix% &fSubido el registro de depuración a: %url%"
upload-log-start: "%prefix% &fSubiendo registros... por favor espera"
upload-log-not-found: "%prefix% &cNo se pudo encontrar ese registro"
upload-log-upload-failure: "%prefix% &cAlgo salio mal mientras subíamos ese registro, mira la consola para mas información"
disconnect:
    timeout: "<lang:disconnect.timeout>"
    closed: "<lang:disconnect.closed>"
    error: "<red>An error occurred whilst processing packets. Please contact the administrators."
    blacklisted-forge: "<red>Your forge version is blacklisted due to inbuilt reach hacks.<newline><gold>Versions affected: 1.18.2-1.19.3<newline><newline><red>Please see https://github.com/MinecraftForge/MinecraftForge/issues/9309."
run-as-player: "%prefix% &c¡Este comando solo puede ser utilizado por jugadores!"
run-as-player-or-console: "%prefix% &c¡Este comando solo puede ser utilizado por jugadores o la consola!"
webhook-not-enabled: "Discord webhooks are not enabled!"
webhook-test-message: "test message"
webhook-test-succeeded: "Discord webhook test succeeded!"
webhook-test-failed: "Discord webhook test failed!"

# Placeholders validos:
# %prefix%
# %player%
# %check_name%
# %description%
# %experimental%
# %vl% - violaciones
# %verbose% - información extra de la comprobación como compensaciones. No todas añadirán informacion.
alerts-format: "%prefix% &f%player% &bfalló <hover:show_text:\"&b%check_name%%experimental%\n&8Descripción: &f%description%\">&f%check_name%%experimental%</hover> &f(x&c%vl%&f) &7%verbose%"
alerts-format-proxy: "%prefix% &f[&cproxy&f] &f%player% &bfailed <hover:show_text:\"&b%check_name%%experimental%\n&8Descripción: &f%description%\">&f%check_name%%experimental%</hover> &f(x&c%vl%&f) &7%verbose%"
experimental-symbol: "*"

profile:
    - "&7======================"
    - "%prefix% &bPerfil de &f%player%"
    - "&bPing: &f%ping%"
    - "&bVersión: &f%version%"
    - "&bMarca del cliente: &f%brand%"
    - "&bSensibilidad horizontal: &f%h_sensitivity%%"
    - "&bSensibilidad vertical: &f%v_sensitivity%%"
    - "&bFastMath habilitado: &f%fast_math%"
    - "&7======================"
help:
    - "&7======================"
    - "/AltarAC alerts &f- &7Alternar alertas"
    - "/AltarAC brands &f- &7Toggle brands"
    - "/AltarAC profile <player> &f- &7Mostrar informacion del jugador"
    - "/AltarAC help &f- &7Mostrar este mensaje de ayuda"
    - "/AltarAC debug <player> &f- &7Salida de predicciones para desarrolladores"
    - "/AltarAC perf &f- &7ms/predicción para los desarrolladores"
    - "/AltarAC reload &f- &7Recarga la configuración"
    - "/AltarAC spectate <player> &f- &7Espectar a un jugador"
    - "/AltarAC verbose &f- &7Te muestra todo aviso, sin buffers"
    - "/AltarAC log [0-255] &f- &7Sube un registro de depuración para avisos de predicciones"
    - "/AltarAC history <player> &f- &7Lista de sesiones (más nuevas primero)"
    - "/AltarAC history <player> page <N> &f- &7Saltar a la página N de la lista de sesiones"
    - "/AltarAC history <player> session <N|latest> [-d] [-v] &f- &7Detalle de la sesión (violaciones más recientes primero)"
    - "/AltarAC history <player> session <N|latest> page <N> [-d] [-v] &f- &7Detalle de la sesión, página N de violaciones"
    - "&7======================"

# === /AltarAC history ===
# UI de historial basada en sesiones. Todas las líneas siguientes son
# configurables; los placeholders se documentan en cada clave. El texto en
# hover de las líneas de sesión y violación lo construye el renderer a partir
# de los datos brutos (verbose, desglose de checks) y no necesita plantilla;
# pero puedes añadir <hover:show_text:'...'> a cualquier línea para sumar
# tooltips adicionales.

AltarAC-history-load-failure: "%prefix% &c¡El subsistema de historial no se pudo cargar! Revisa la consola del servidor en busca de errores."
AltarAC-history-disabled: "%prefix% &c¡El subsistema de historial está deshabilitado!"
AltarAC-history-failed: "%prefix% &cError al cargar el historial: &7%error%"
AltarAC-history-unknown-player: "%prefix% &cJugador desconocido: &f%player%"
AltarAC-history-no-sessions: "%prefix% &7Sin historial de sesiones para &f%player%&7."
AltarAC-history-session-not-found: "%prefix% &cSesión &f%ordinal%&c no encontrada para &f%player%&c."

# Lista de sesiones — placeholders válidos: %prefix% %player% %page% %max_pages%
AltarAC-history-header: "%prefix% &bMostrando historial de sesiones de &f%player% &8[&f%page%&7/&f%max_pages%&8]"
# Línea de resumen de una sesión — placeholders válidos:
#   %prefix% %player% %ordinal% %AltarAC_version% %server_name%
#   %client_version% %client_brand% %duration% %timeago%
#   %violations% %unique_checks% %crashed_marker%
# %crashed_marker% se expande a AltarAC-history-crashed-marker para sesiones cuya
# conexión cayó sin cierre limpio (caída del servidor, kill -9, RST de canal
# que no disparó UserDisconnectEvent). Cadena vacía para sesiones en curso o
# cerradas correctamente.
AltarAC-history-session: "%prefix% &8[&b%AltarAC_version%&8] &8[&b%server_name%&8] &8[&b%client_version%&8] &bSesión &f%ordinal%&b, duración &f%duration%&b, con &c%violations%&b violaciones &8[&c%unique_checks%&8]%crashed_marker% &8(&7hace %timeago%&8)"

# Marcador en línea sustituido en %crashed_marker% para sesiones cuyo
# closed_at == last_activity (es decir, marcadas por el barrido de cierre del
# siguiente arranque, no por la ruta de desconexión). Incluye un espacio
# inicial para que el marcador se lea natural cuando aparece y desaparezca
# limpiamente cuando está vacío.
AltarAC-history-crashed-marker: " &8(&ccaída&8)"

# Detalle de sesión — placeholders válidos:
#   %prefix% %player% %ordinal% %AltarAC_version% %server_name%
#   %client_version% %client_brand% %duration% %timeago%
#   %violations% %unique_checks% %bucket_size%
AltarAC-history-detail-header: "%prefix% &bMostrando detalle de la sesión &f%ordinal% &bde &f%player%&b:"
AltarAC-history-detail-meta1: "%prefix% &bAltarAC: &f%AltarAC_version%&b, Servidor: &f%server_name%&b, Duración: &f%duration%&b, Fecha: &7hace %timeago%"
AltarAC-history-detail-meta2: "%prefix% &bCliente: &f%client_version%&b, Marca: &f%client_brand%"
AltarAC-history-detail-violations-header: "%prefix% &bViolaciones: &8(%violations% en total, %unique_checks% únicas)"
AltarAC-history-detail-empty: "%prefix% &7- (ninguna)"
# Fila agrupada (predeterminado) — placeholders válidos: %prefix% %offset% %checks_list%
#   %checks_list% se construye uniendo entradas AltarAC-history-check-count con ", "
AltarAC-history-detail-group: "%prefix% &7- %checks_list% &8(&b%offset%&8)"
# Fila de violación bruta (--detailed) — placeholders válidos:
#   %prefix% %offset% %check% %vl% %verbose%
AltarAC-history-detail-entry: "%prefix% &7- &f%check% &8(&b%offset%&8)&7 %verbose%"
# Formato interno por check dentro de %checks_list% — placeholders válidos: %check_name% %count%
AltarAC-history-check-count: "&f%check_name%&7 x&c%count%"

# Marcadores de esquema — ver el comentario de cabecera en config.yml.
config-flavor: V2
config-version: 1
