prefix: "<gray>[<gradient:#FB0000:#FF874C><b>AltarAC</gradient><gray>]"

alerts-enabled: "%prefix% &fAlertes activées"
alerts-disabled: "%prefix% &fAlertes désactivées"
verbose-enabled: "%prefix% &fVerbose enabled"
verbose-disabled: "%prefix% &fVerbose disabled"
brands-enabled: "%prefix% &fBrands enabled"
brands-disabled: "%prefix% &fBrands disabled"
client-brand-format: "%prefix% &f%player% a rejoint en utilisant %brand%"
console-specify-target: "%prefix% &cVous devez spécifier une cible en tant que console !"
reloading: "%prefix% &7Reloading config..."
reloaded: "%prefix% &fConfig has been reloaded."
reload-failed: "%prefix% &cFailed to reload config."
player-not-found: "%prefix% &cPlayer est ignoré ou hors ligne !"
player-not-this-server: "%prefix% &cPlayer n'est pas sur ce serveur !"
sender-not-found: "%prefix% &cVous ne pouvez pas utiliser cette commande si vous êtes exempté !"
spectate-return: "<click:run_command:/AltarAC stopspectating><hover:show_text:\"/AltarAC stopspectating\">\n%prefix% &fClickez ici pour retourner à votre position d'origine\n</hover></click>"
cannot-spectate-return: "%prefix% &cVous pouvez faire cela uniquement en étant en spectateur"
cannot-run-on-self: "%prefix% &cVous ne pouvez pas utiliser cette commande sur vous-même !"
upload-log: "%prefix% &fLe fichier de débogage a été téléversé vers : %url%"
upload-log-start: "%prefix% &fTéléversement du journal... Veuillez patienter"
upload-log-not-found: "%prefix% &cUImpossible de trouver le journal de débogage"
upload-log-upload-failure: "%prefix% &cUne erreur est survenue lors du téléversement de ce journal, regardez la console pour plus d'information"
disconnect:
    timeout: "<lang:disconnect.timeout>"
    closed: "<lang:disconnect.closed>"
    error: "<red>An error occurred whilst processing packets. Please contact the administrators."
    blacklisted-forge: "<red>Your forge version is blacklisted due to inbuilt reach hacks.<newline><gold>Versions affected: 1.18.2-1.19.3<newline><newline><red>Please see https://github.com/MinecraftForge/MinecraftForge/issues/9309."
run-as-player: "%prefix% &cCette commande ne peut être utilisée que par les joueurs !"
run-as-player-or-console: "%prefix% &cCette commande ne peut être utilisée que par les joueurs ou la console !"
webhook-not-enabled: "Discord webhooks are not enabled!"
webhook-test-message: "test message"
webhook-test-succeeded: "Discord webhook test succeeded!"
webhook-test-failed: "Discord webhook test failed!"

# Placeholders valides :
# %prefix%
# %player%
# %check_name%
# %description%
# %experimental%
# %vl% - violations
# %verbose% - Informations supplémentaires sur les vérifivations comme les écarts, toutes les vérifications n'ajoutent pas d'information
alerts-format: "%prefix% &f%player% &ba échoué <hover:show_text:\"&b%check_name%%experimental%\n&8Description: &f%description%\">&f%check_name%%experimental%</hover> &f(x&c%vl%&f) &7%verbose%"
alerts-format-proxy: "%prefix% &f[&cproxy&f] &f%player% &ba échoué <hover:show_text:\"&b%check_name%%experimental%\n&8Description: &f%description%\">&f%check_name%%experimental%</hover> &f(x&c%vl%&f) &7%verbose%"
experimental-symbol: "*"

profile:
    - "&7======================"
    - "%prefix% &bProfil de &f%player%"
    - "&bPing: &f%ping%"
    - "&bVersion du client : &f%version%"
    - "&bNature du client : &f%brand%"
    - "&bSensibilité Horizontale : &f%h_sensitivity%%"
    - "&bSensibilité Verticale : &f%v_sensitivity%%"
    - "&bFastMath est activé : &f%fast_math%"
    - "&7======================"
help:
    - "&7======================"
    - "/AltarAC alerts &f- &7Activer/Désactiver les alertes"
    - "/AltarAC brands &f- &7Toggle brands"
    - "/AltarAC profile <player> &f- &7Voir le profil du joueur"
    - "/AltarAC help &f- &7Afficher l'aide"
    - "/AltarAC debug <player> &f- &7Afficher les informations de débogage du joueur"
    - "/AltarAC perf &f- &7Afficher les informations de performance"
    - "/AltarAC reload &f- &7Recharger la configuration"
    - "/AltarAC spectate <player> &f- &7Regarder un joueur"
    - "/AltarAC verbose &f- &7Affiche chaqu'une de vos violations, sans tampons"
    - "/AltarAC log [0-255] &f- &7Téléverse un journal de débogage pour les indicateurs de prédiction"
    - "/AltarAC history <player> &f- &7Liste des sessions (les plus récentes en premier)"
    - "/AltarAC history <player> page <N> &f- &7Aller à la page N de la liste des sessions"
    - "/AltarAC history <player> session <N|latest> [-d] [-v] &f- &7Détail d'une session (violations les plus récentes en premier)"
    - "/AltarAC history <player> session <N|latest> page <N> [-d] [-v] &f- &7Détail d'une session, page N des violations"
    - "&7======================"

# === /AltarAC history ===
# UI d'historique basée sur les sessions. Toutes les lignes ci-dessous sont
# entièrement configurables ; les placeholders sont documentés à chaque clé.
# Le texte au survol des lignes de session et de violation est construit par
# le renderer à partir des données brutes (verbose, ventilation des checks)
# et n'a pas besoin de modèle — mais vous pouvez ajouter
# <hover:show_text:'...'> sur n'importe quelle ligne pour superposer des
# tooltips supplémentaires.

AltarAC-history-load-failure: "%prefix% &cLe sous-système d'historique n'a pas pu être chargé ! Vérifiez la console du serveur pour les erreurs."
AltarAC-history-disabled: "%prefix% &cLe sous-système d'historique est désactivé !"
AltarAC-history-failed: "%prefix% &cÉchec du chargement de l'historique : &7%error%"
AltarAC-history-unknown-player: "%prefix% &cJoueur inconnu : &f%player%"
AltarAC-history-no-sessions: "%prefix% &7Pas d'historique de sessions pour &f%player%&7."
AltarAC-history-session-not-found: "%prefix% &cSession &f%ordinal%&c introuvable pour &f%player%&c."

# Liste des sessions — placeholders valides : %prefix% %player% %page% %max_pages%
AltarAC-history-header: "%prefix% &bAffichage de l'historique des sessions pour &f%player% &8[&f%page%&7/&f%max_pages%&8]"
# Ligne de résumé d'une session — placeholders valides :
#   %prefix% %player% %ordinal% %AltarAC_version% %server_name%
#   %client_version% %client_brand% %duration% %timeago%
#   %violations% %unique_checks% %crashed_marker%
# %crashed_marker% s'étend en AltarAC-history-crashed-marker pour les sessions
# dont la connexion a disparu sans fermeture propre (crash serveur, kill -9,
# RST de canal sans UserDisconnectEvent). Chaîne vide pour les sessions en
# cours ou closes proprement.
AltarAC-history-session: "%prefix% &8[&b%AltarAC_version%&8] &8[&b%server_name%&8] &8[&b%client_version%&8] &bSession &f%ordinal%&b, durée &f%duration%&b, avec &c%violations%&b violations &8[&c%unique_checks%&8]%crashed_marker% &8(&7il y a %timeago%&8)"

# Marqueur en ligne substitué dans %crashed_marker% pour les sessions dont
# closed_at == last_activity (c.-à-d. estampillées par le balayage de crash
# au prochain démarrage, et non par le chemin de déconnexion). Inclut un
# espace de tête pour que le marqueur se lise naturellement quand il est
# présent et disparaisse proprement quand il est vide.
AltarAC-history-crashed-marker: " &8(&ccrash&8)"

# Détail de session — placeholders valides :
#   %prefix% %player% %ordinal% %AltarAC_version% %server_name%
#   %client_version% %client_brand% %duration% %timeago%
#   %violations% %unique_checks% %bucket_size%
AltarAC-history-detail-header: "%prefix% &bDétail de la session &f%ordinal% &bde &f%player%&b :"
AltarAC-history-detail-meta1: "%prefix% &bAltarAC : &f%AltarAC_version%&b, Serveur : &f%server_name%&b, Durée : &f%duration%&b, Date : &7il y a %timeago%"
AltarAC-history-detail-meta2: "%prefix% &bClient : &f%client_version%&b, Marque : &f%client_brand%"
AltarAC-history-detail-violations-header: "%prefix% &bViolations : &8(%violations% au total, %unique_checks% uniques)"
AltarAC-history-detail-empty: "%prefix% &7- (aucune)"
# Ligne groupée (par défaut) — placeholders valides : %prefix% %offset% %checks_list%
#   %checks_list% est construite en joignant les entrées AltarAC-history-check-count avec ", "
AltarAC-history-detail-group: "%prefix% &7- %checks_list% &8(&b%offset%&8)"
# Ligne de violation brute (--detailed) — placeholders valides :
#   %prefix% %offset% %check% %vl% %verbose%
AltarAC-history-detail-entry: "%prefix% &7- &f%check% &8(&b%offset%&8)&7 %verbose%"
# Format interne pour chaque check dans %checks_list% — placeholders valides : %check_name% %count%
AltarAC-history-check-count: "&f%check_name%&7 x&c%count%"

# Marqueurs de schéma — voir le commentaire d'en-tête dans config.yml.
config-flavor: V2
config-version: 1
