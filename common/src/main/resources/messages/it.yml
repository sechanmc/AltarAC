    - "&7======================"

# === /AltarAC history ===
# UI cronologia basata sulle sessioni. Tutte le righe sotto sono pienamente
# configurabili; i placeholder sono documentati per ciascuna chiave. Il testo
# in hover delle righe di sessione e violazione è costruito dal renderer dai
# dati grezzi (verbose, ripartizione check) e non richiede un template — ma
# puoi aggiungere <hover:show_text:'...'> a qualsiasi riga per sovrapporre
# tooltip aggiuntivi.

AltarAC-history-load-failure: "%prefix% &cImpossibile caricare il sottosistema della cronologia! Controlla la console del server per errori."
AltarAC-history-disabled: "%prefix% &cIl sottosistema cronologia è disabilitato!"
AltarAC-history-failed: "%prefix% &cCaricamento cronologia fallito: &7%error%"
AltarAC-history-unknown-player: "%prefix% &cGiocatore sconosciuto: &f%player%"
AltarAC-history-no-sessions: "%prefix% &7Nessuna cronologia di sessioni per &f%player%&7."
AltarAC-history-session-not-found: "%prefix% &cSessione &f%ordinal%&c non trovata per &f%player%&c."

# Lista sessioni — placeholder validi: %prefix% %player% %page% %max_pages%
AltarAC-history-header: "%prefix% &bMostrando cronologia sessioni per &f%player% &8[&f%page%&7/&f%max_pages%&8]"
# Riga di riepilogo singola sessione — placeholder validi:
#   %prefix% %player% %ordinal% %AltarAC_version% %server_name%
#   %client_version% %client_brand% %duration% %timeago%
#   %violations% %unique_checks% %crashed_marker%
# %crashed_marker% si espande in AltarAC-history-crashed-marker per sessioni la
# cui connessione è caduta senza chiusura pulita (crash del server, kill -9,
# RST del canale che non ha attivato UserDisconnectEvent). Stringa vuota per
# sessioni in corso o chiuse correttamente.
AltarAC-history-session: "%prefix% &8[&b%AltarAC_version%&8] &8[&b%server_name%&8] &8[&b%client_version%&8] &bSessione &f%ordinal%&b, durata &f%duration%&b, con &c%violations%&b violazioni &8[&c%unique_checks%&8]%crashed_marker% &8(&7%timeago% fa&8)"

# Marcatore inline sostituito in %crashed_marker% per sessioni il cui
# closed_at == last_activity (cioè marcate dallo sweep di crash al successivo
# avvio, non dal percorso di disconnessione). Include uno spazio iniziale
# perché il marcatore si legga naturalmente quando presente e scompaia
# pulito quando vuoto.
AltarAC-history-crashed-marker: " &8(&ccrash&8)"

# Dettaglio sessione — placeholder validi:
#   %prefix% %player% %ordinal% %AltarAC_version% %server_name%
#   %client_version% %client_brand% %duration% %timeago%
#   %violations% %unique_checks% %bucket_size%
AltarAC-history-detail-header: "%prefix% &bDettaglio sessione &f%ordinal% &bdi &f%player%&b:"
AltarAC-history-detail-meta1: "%prefix% &bAltarAC: &f%AltarAC_version%&b, Server: &f%server_name%&b, Durata: &f%duration%&b, Data: &7%timeago% fa"
AltarAC-history-detail-meta2: "%prefix% &bClient: &f%client_version%&b, Marca: &f%client_brand%"
AltarAC-history-detail-violations-header: "%prefix% &bViolazioni: &8(%violations% totali, %unique_checks% uniche)"
AltarAC-history-detail-empty: "%prefix% &7- (nessuna)"
# Riga raggruppata (predefinito) — placeholder validi: %prefix% %offset% %checks_list%
#   %checks_list% è costruita unendo voci AltarAC-history-check-count con ", "
AltarAC-history-detail-group: "%prefix% &7- %checks_list% &8(&b%offset%&8)"
# Riga di violazione singola (--detailed) — placeholder validi:
#   %prefix% %offset% %check% %vl% %verbose%
AltarAC-history-detail-entry: "%prefix% &7- &f%check% &8(&b%offset%&8)&7 %verbose%"
# Formato interno per ogni check in %checks_list% — placeholder validi: %check_name% %count%
AltarAC-history-check-count: "&f%check_name%&7 x&c%count%"

# Marcatori di schema — vedi il commento di intestazione in config.yml.
config-flavor: V2
config-version: 1
