# \u00BB is » (double >>), ANSI en UTF-8 interpreteren dit anders... je kunt zelfs "?" zien als gevolg hiervan
prefix: "<gray>[<gradient:#FB0000:#FF874C><b>AltarAC</gradient><gray>]"

alerts-enabled: "%prefix% &fMeldingen ingeschakeld"
alerts-disabled: "%prefix% &fMeldingen uitgeschakeld"
verbose-enabled: "%prefix% &fVerbose enabled"
verbose-disabled: "%prefix% &fVerbose disabled"
brands-enabled: "%prefix% &fBrands enabled"
brands-disabled: "%prefix% &fBrands disabled"
client-brand-format: "%prefix% &f%player% is lid geworden met %brand%"
console-specify-target: "%prefix% &cJe moet een doel opgeven als de console!"
reloading: "%prefix% &7Reloading config..."
reloaded: "%prefix% &fConfig has been reloaded."
reload-failed: "%prefix% &cFailed to reload config."
player-not-found: "%prefix% &cSpeler is vrijgesteld of offline!"
player-not-this-server: "%prefix% &cSpeler is niet op deze server!"
sender-not-found: "%prefix% &cJe kunt dit commando niet gebruiken als je vrijgesteld bent!"
spectate-return: "<click:run_command:/AltarAC stopspectating><hover:show_text:\"/AltarAC stopspectating\">\n%prefix% &fKlik hier om terug te keren naar de vorige locatie\n</hover></click>"
cannot-spectate-return: "%prefix% &cJe kunt dit alleen doen nadat je een speler hebt bekeken"
cannot-run-on-self: "%prefix% &cJe kunt dit commando niet op jezelf gebruiken!"
upload-log: "%prefix% &fDebug geüpload naar: %url%"
upload-log-start: "%prefix% &fLog wordt geüpload... even geduld"
upload-log-not-found: "%prefix% &cKan dat log niet vinden"
upload-log-upload-failure: "%prefix% &cEr is iets misgegaan tijdens het uploaden van dit log, zie console voor meer informatie"
disconnect:
    timeout: "<lang:disconnect.timeout>"
    closed: "<lang:disconnect.closed>"
    error: "<red>An error occurred whilst processing packets. Please contact the administrators."
    blacklisted-forge: "<red>Your forge version is blacklisted due to inbuilt reach hacks.<newline><gold>Versions affected: 1.18.2-1.19.3<newline><newline><red>Please see https://github.com/MinecraftForge/MinecraftForge/issues/9309."
run-as-player: "%prefix% &cDit commando kan alleen door spelers worden gebruikt!"
run-as-player-or-console: "%prefix% &cDit commando kan alleen door spelers of de console worden gebruikt!"
webhook-not-enabled: "Discord webhooks are not enabled!"
webhook-test-message: "test message"
webhook-test-succeeded: "Discord webhook test succeeded!"
webhook-test-failed: "Discord webhook test failed!"

# Geldige plaatsaanduidingen:
# %prefix%
# %player%
# %check_name%
# %description%
# %experimental%
# %vl% - overtredingen
# %verbose% - extra informatie van de controle zoals offsets, niet alle controles voegen informatie toe
alerts-format: "%prefix% &f%player% &bmislukt <hover:show_text:\"&b%check_name%%experimental%\n&8Beschrijving: &f%description%\">&f%check_name%%experimental%</hover> &f(x&c%vl%&f) &7%verbose%"
alerts-format-proxy: "%prefix% &f[&cproxy&f] &f%player% &bmislukt <hover:show_text:\"&b%check_name%%experimental%\n&8Beschrijving: &f%description%\">&f%check_name%%experimental%</hover> &f(x&c%vl%&f) &7%verbose%"
experimental-symbol: "*"

profile:
    - "&7======================"
    - "%prefix% &bProfiel voor &f%player%"
    - "&bPing: &f%ping%"
    - "&bVersie: &f%version%"
    - "&bClient Merk: &f%brand%"
    - "&bHorizontale Gevoeligheid: &f%h_sensitivity%%"
    - "&bVerticale Gevoeligheid: &f%v_sensitivity%%"
    - "&bFastMath Ingeschakeld: &f%fast_math%"
    - "&7======================"
help:
    - "&7======================"
    - "/AltarAC alerts &f- &7Meldingen inschakelen"
    - "/AltarAC brands &f- &7Toggle brands"
    - "/AltarAC profile <player> &f- &7Bekijk speler info"
    - "/AltarAC help &f- &7Bekijk dit helpbericht"
    - "/AltarAC debug <player> &f- &7Voorspellingsuitvoer ontwikkelaar"
    - "/AltarAC perf &f- &7Ontwikkelaar ms/voorspelling"
    - "/AltarAC reload &f- &7Laadt de configuratie opnieuw"
    - "/AltarAC spectate <player> &f- &7Een speler bekijken"
    - "/AltarAC verbose &f- &7Toont elke flag, zonder buffers"
    - "/AltarAC log [0-255] &f- &7Uploadt een debug-log voor voorspellings-flaggen"
    - "/AltarAC history <player> &f- &7Sessielijst (nieuwste eerst)"
    - "/AltarAC history <player> page <N> &f- &7Spring naar pagina N van de sessielijst"
    - "/AltarAC history <player> session <N|latest> [-d] [-v] &f- &7Sessiedetail (nieuwste overtredingen eerst)"
    - "/AltarAC history <player> session <N|latest> page <N> [-d] [-v] &f- &7Sessiedetail, overtredingenpagina N"
    - "&7======================"

# === /AltarAC history ===
# Op sessies gebaseerde geschiedenis-UI. Alle regels hieronder zijn vrij
# instelbaar; placeholders zijn per sleutel gedocumenteerd. Hover-tekst voor
# sessie- en overtredingsregels wordt door de renderer opgebouwd uit de ruwe
# data (verbose, check-uitsplitsing) en heeft geen template nodig — je kunt
# echter <hover:show_text:'...'> aan elke regel toevoegen om extra tooltips
# erbovenop te leggen.

AltarAC-history-load-failure: "%prefix% &cGeschiedenissubsysteem kon niet worden geladen! Controleer de serverconsole op fouten."
AltarAC-history-disabled: "%prefix% &cHet geschiedenissubsysteem is uitgeschakeld!"
AltarAC-history-failed: "%prefix% &cKon geschiedenis niet laden: &7%error%"
AltarAC-history-unknown-player: "%prefix% &cOnbekende speler: &f%player%"
AltarAC-history-no-sessions: "%prefix% &7Geen sessiegeschiedenis voor &f%player%&7."
AltarAC-history-session-not-found: "%prefix% &cSessie &f%ordinal%&c niet gevonden voor &f%player%&c."

# Sessielijst — geldige placeholders: %prefix% %player% %page% %max_pages%
AltarAC-history-header: "%prefix% &bSessiegeschiedenis tonen voor &f%player% &8[&f%page%&7/&f%max_pages%&8]"
# Samenvattingsregel per sessie — geldige placeholders:
#   %prefix% %player% %ordinal% %AltarAC_version% %server_name%
#   %client_version% %client_brand% %duration% %timeago%
#   %violations% %unique_checks% %crashed_marker%
# %crashed_marker% breidt uit naar AltarAC-history-crashed-marker voor sessies
# waarvan de verbinding zonder nette afsluiting wegviel (servercrash, kill -9,
# kanaal-RST die geen UserDisconnectEvent vuurt). Lege string voor lopende of
# netjes gesloten sessies.
AltarAC-history-session: "%prefix% &8[&b%AltarAC_version%&8] &8[&b%server_name%&8] &8[&b%client_version%&8] &bSessie &f%ordinal%&b, duur &f%duration%&b, met &c%violations%&b overtredingen &8[&c%unique_checks%&8]%crashed_marker% &8(&7%timeago% geleden&8)"

# Inline-markering die in %crashed_marker% wordt geplaatst voor sessies met
# closed_at == last_activity (d.w.z. gestempeld door de crash-sweep bij de
# volgende start, niet door het disconnect-pad). Begint met een spatie zodat
# de markering natuurlijk leest wanneer aanwezig en netjes verdwijnt
# wanneer leeg.
AltarAC-history-crashed-marker: " &8(&cgecrasht&8)"

# Sessiedetail — geldige placeholders:
#   %prefix% %player% %ordinal% %AltarAC_version% %server_name%
#   %client_version% %client_brand% %duration% %timeago%
#   %violations% %unique_checks% %bucket_size%
AltarAC-history-detail-header: "%prefix% &bDetails van sessie &f%ordinal% &bvan &f%player%&b:"
AltarAC-history-detail-meta1: "%prefix% &bAltarAC: &f%AltarAC_version%&b, Server: &f%server_name%&b, Duur: &f%duration%&b, Datum: &7%timeago% geleden"
AltarAC-history-detail-meta2: "%prefix% &bClient: &f%client_version%&b, Merk: &f%client_brand%"
AltarAC-history-detail-violations-header: "%prefix% &bOvertredingen: &8(%violations% totaal, %unique_checks% uniek)"
AltarAC-history-detail-empty: "%prefix% &7- (geen)"
# Gegroepeerde regel (standaard) — geldige placeholders: %prefix% %offset% %checks_list%
#   %checks_list% wordt gebouwd door AltarAC-history-check-count-items te verbinden met ", "
AltarAC-history-detail-group: "%prefix% &7- %checks_list% &8(&b%offset%&8)"
# Enkele ruwe overtredingsregel (--detailed) — geldige placeholders:
#   %prefix% %offset% %check% %vl% %verbose%
AltarAC-history-detail-entry: "%prefix% &7- &f%check% &8(&b%offset%&8)&7 %verbose%"
# Intern formaat per check in %checks_list% — geldige placeholders: %check_name% %count%
AltarAC-history-check-count: "&f%check_name%&7 x&c%count%"

# Schemamarkers — zie de header-comment in config.yml.
config-flavor: V2
config-version: 1
