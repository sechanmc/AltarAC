upload-log-not-found: "%prefix% &cНевозможно найти этот журнал"
upload-log-upload-failure: "%prefix% &cЧто-то пошло не так при загрузке этого журнала, смотрите консоль для получения дополнительной информации"
disconnect:
    timeout: "<lang:disconnect.timeout>"
    closed: "<lang:disconnect.closed>"
    error: "<red>An error occurred whilst processing packets. Please contact the administrators."
    blacklisted-forge: "<red>Your forge version is blacklisted due to inbuilt reach hacks.<newline><gold>Versions affected: 1.18.2-1.19.3<newline><newline><red>Please see https://github.com/MinecraftForge/MinecraftForge/issues/9309."
run-as-player: "%prefix% &cЭту команду могут использовать только игроки!"
run-as-player-or-console: "%prefix% &cЭту команду могут использовать только игроки или консоль!"
webhook-not-enabled: "Discord webhooks are not enabled!"
webhook-test-message: "test message"
webhook-test-succeeded: "Discord webhook test succeeded!"
webhook-test-failed: "Discord webhook test failed!"

# Допустимые заполнители:
# %prefix%
# %player%
# %check_name%
# %description%
# %experimental%
# %vl% - нарушения
# %verbose% - дополнительная информация от проверки, например, смещения, не все проверки добавляют информацию.
alerts-format: "%prefix% &f%player% &bпровалил <hover:show_text:\"&b%check_name%%experimental%\n&8Описание: &f%description%\">&f%check_name%%experimental%</hover> &f(x&c%vl%&f) &7%verbose%"
alerts-format-proxy: "%prefix% &f[&cproxy&f] &f%player% &bпровалил <hover:show_text:\"&b%check_name%%experimental%\n&8Описание: &f%description%\">&f%check_name%%experimental%</hover> &f(x&c%vl%&f) &7%verbose%"
experimental-symbol: "*"

profile:
    - "&7======================"
    - "%prefix% &bПрофиль для &f%player%"
    - "&bПинг: &f%ping%"
    - "&bВерсия: &f%version%"
    - "&bБренд клиента: &f%brand%"
    - "&bГоризонтальная чувствительность: &f%h_sensitivity%%"
    - "&bВертикальная чувствительность: &f%v_sensitivity%%"
    - "&bFastMath Включено: &f%fast_math%"
    - "&7======================"
help:
    - "&7======================"
    - "/AltarAC alerts &f- &7Включить/выключить оповещения"
    - "/AltarAC brands &f- &7Toggle brands"
    - "/AltarAC profile <игрок> &f- &7Просмотреть информацию об игроке"
    - "/AltarAC help &f- &7Просмотреть это сообщение помощи"
    - "/AltarAC debug <игрок> &f- &7Вывод прогноза разработчика"
    - "/AltarAC perf &f- &7Вывод производительности AltarAC для разработчиков"
    - "/AltarAC reload &f- &7Перезагружает конфигурацию"
    - "/AltarAC spectate <игрок> &f- &7Наблюдать за игроком"
    - "/AltarAC verbose &f- &7Показывает все флаги без буферов"
    - "/AltarAC log [0-255] &f- &7Загружает журнал отладки для флагов предсказания"
    - "/AltarAC history <player> &f- &7Список сессий (новые сверху)"
    - "/AltarAC history <player> page <N> &f- &7Перейти к странице N списка сессий"
    - "/AltarAC history <player> session <N|latest> [-d] [-v] &f- &7Детали сессии (свежие нарушения сверху)"
    - "/AltarAC history <player> session <N|latest> page <N> [-d] [-v] &f- &7Детали сессии, страница N нарушений"
    - "&7======================"

# === /AltarAC history ===
# UI истории на основе сессий. Все строки ниже полностью настраиваются;
# плейсхолдеры задокументированы у каждого ключа. Текст hover для строк
# сессий и нарушений собирает рендерер из сырых данных (verbose, разбивка
# по чекам), шаблон для него не нужен — но в любую строку можно добавить
# <hover:show_text:'...'> и наложить дополнительный тултип.

AltarAC-history-load-failure: "%prefix% &cНе удалось загрузить подсистему истории! Проверьте консоль сервера на наличие ошибок."
AltarAC-history-disabled: "%prefix% &cПодсистема истории отключена!"
AltarAC-history-failed: "%prefix% &cНе удалось загрузить историю: &7%error%"
AltarAC-history-unknown-player: "%prefix% &cНеизвестный игрок: &f%player%"
AltarAC-history-no-sessions: "%prefix% &7Нет истории сессий для &f%player%&7."
AltarAC-history-session-not-found: "%prefix% &cСессия &f%ordinal%&c не найдена для &f%player%&c."

# Список сессий — допустимые плейсхолдеры: %prefix% %player% %page% %max_pages%
AltarAC-history-header: "%prefix% &bИстория сессий для &f%player% &8[&f%page%&7/&f%max_pages%&8]"
# Сводная строка одной сессии — допустимые плейсхолдеры:
#   %prefix% %player% %ordinal% %AltarAC_version% %server_name%
#   %client_version% %client_brand% %duration% %timeago%
#   %violations% %unique_checks% %crashed_marker%
# %crashed_marker% разворачивается в AltarAC-history-crashed-marker для сессий,
# чьё соединение оборвалось без штатного закрытия (краш сервера, kill -9,
# RST канала, не вызвавший UserDisconnectEvent). Для активных или штатно
# закрытых сессий — пустая строка.
AltarAC-history-session: "%prefix% &8[&b%AltarAC_version%&8] &8[&b%server_name%&8] &8[&b%client_version%&8] &bСессия &f%ordinal%&b, длительность &f%duration%&b, нарушений &c%violations%&b &8[&c%unique_checks%&8]%crashed_marker% &8(&7%timeago% назад&8)"

# Встроенный маркер, подставляемый в %crashed_marker% для сессий с
# closed_at == last_activity (то есть проставленных при следующем запуске
# crash-sweep'ом, а не путём штатного дисконнекта). Содержит ведущий
# пробел: при наличии маркер читается естественно, при отсутствии чисто
# исчезает.
AltarAC-history-crashed-marker: " &8(&cкраш&8)"

# Детали сессии — допустимые плейсхолдеры:
#   %prefix% %player% %ordinal% %AltarAC_version% %server_name%
#   %client_version% %client_brand% %duration% %timeago%
#   %violations% %unique_checks% %bucket_size%
AltarAC-history-detail-header: "%prefix% &bДетали сессии &f%ordinal% &bигрока &f%player%&b:"
AltarAC-history-detail-meta1: "%prefix% &bAltarAC: &f%AltarAC_version%&b, сервер: &f%server_name%&b, длительность: &f%duration%&b, дата: &7%timeago% назад"
AltarAC-history-detail-meta2: "%prefix% &bКлиент: &f%client_version%&b, бренд: &f%client_brand%"
AltarAC-history-detail-violations-header: "%prefix% &bНарушения: &8(всего %violations%, уникальных %unique_checks%)"
AltarAC-history-detail-empty: "%prefix% &7- (нет)"
# Сгруппированная строка (по умолчанию) — допустимые плейсхолдеры: %prefix% %offset% %checks_list%
#   %checks_list% строится склейкой записей AltarAC-history-check-count через ", "
AltarAC-history-detail-group: "%prefix% &7- %checks_list% &8(&b%offset%&8)"
# Одиночная строка нарушения (--detailed) — допустимые плейсхолдеры:
#   %prefix% %offset% %check% %vl% %verbose%
AltarAC-history-detail-entry: "%prefix% &7- &f%check% &8(&b%offset%&8)&7 %verbose%"
# Внутренний формат каждой записи в %checks_list% — допустимые плейсхолдеры: %check_name% %count%
AltarAC-history-check-count: "&f%check_name%&7 x&c%count%"

# Маркеры схемы — см. шапку config.yml.
config-flavor: V2
config-version: 1
