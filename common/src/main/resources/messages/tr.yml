# Geçerli placeholderlar:
# %prefix%
# %player%
# %check_name%
# %description%
# %experimental%
# %vl% - ihlal uyarıları
# %verbose% - detaylı olarak verilen tüm uyarılar, checkler tüm bilgileri vermez
alerts-format: "%prefix% &b%player% &fadlı oyuncuda &f(x&c%vl%&f) &fadet <hover:show_text:\"&b%check_name%%experimental%\n&8Açıklama: &f%description%\">&b%check_name%%experimental%</hover> &ftespit edildi: &7%verbose%"
alerts-format-proxy: "%prefix% &f[&cproxy&f] &b%player% &fadlı oyuncuda &f(x&c%vl%&f) &fadet <hover:show_text:\"&b%check_name%%experimental%\n&8Açıklama: &f%description%\">&b%check_name%%experimental%</hover> &ftespit edildi: &7%verbose%"
experimental-symbol: "*"

profile:
    - "&7======================"
    - "%prefix% &f%player% &badlı oyuncunun profili:"
    - "&bGecikme: &f%ping%"
    - "&bVersiyon: &f%version%"
    - "&bKullanılan Client: &f%brand%"
    - "&bDikey Hassasiyet: &f%h_sensitivity%%"
    - "&bYatay Hassasiyet: &f%v_sensitivity%%"
    - "&bFastMath Ayarı: &f%fast_math%"
    - "&7======================"
help:
    - "&7======================"
    - "/AltarAC alerts &f- &7Uyarıları aktif/deaktif eder"
    - "/AltarAC brands &f- &7Toggle brands"
    - "/AltarAC profile (oyuncu) &f- &7Oyuncu profilini gösterir"
    - "/AltarAC help &f- &7Bu yardım mesajını gösterir"
    - "/AltarAC debug <player> &f- &7Geliştirici Debug'ını verir"
    - "/AltarAC perf &f- &7Geliştirici Performansını verir"
    - "/AltarAC reload &f- &7Configi yeniden yükler"
    - "/AltarAC spectate (oyuncu) &f- &7Bir oyuncuyu izlemenizi sağlar"
    - "/AltarAC verbose &f- &7Arabelleğe almadan tüm uyarıları görmenizi sağlar"
    - "/AltarAC log (0-255) &f- &7Uyarılar için bir debug logu çıktısı verir"
    - "/AltarAC history <player> &f- &7Oturum listesi (en yenisi başta)"
    - "/AltarAC history <player> page <N> &f- &7Oturum listesinin N. sayfasına atla"
    - "/AltarAC history <player> session <N|latest> [-d] [-v] &f- &7Oturum detayı (en yeni ihlaller başta)"
    - "/AltarAC history <player> session <N|latest> page <N> [-d] [-v] &f- &7Oturum detayı, ihlal sayfası N"
    - "&7======================"

# === /AltarAC history ===
# Oturum tabanlı geçmiş arayüzü. Aşağıdaki tüm satırlar tamamen yapılandırılabilir;
# placeholder'lar her anahtarda belgelenmiştir. Oturum ve ihlal satırlarındaki
# hover metni, ham verilerden (verbose, kontrol kırılımı) renderer tarafından
# üretilir; bir şablona ihtiyaç yoktur. Yine de herhangi bir satıra
# <hover:show_text:'...'> ekleyerek üzerine ek tooltip katmanı koyabilirsin.

AltarAC-history-load-failure: "%prefix% &cGeçmiş altsistemi yüklenemedi! Hatalar için sunucu konsolunu kontrol edin."
AltarAC-history-disabled: "%prefix% &cGeçmiş alt sistemi devre dışı!"
AltarAC-history-failed: "%prefix% &cGeçmiş yüklenemedi: &7%error%"
AltarAC-history-unknown-player: "%prefix% &cBilinmeyen oyuncu: &f%player%"
AltarAC-history-no-sessions: "%prefix% &7&f%player% &7için oturum geçmişi yok."
AltarAC-history-session-not-found: "%prefix% &c&f%player% &ciçin &f%ordinal% &cnumaralı oturum bulunamadı."

# Oturum listesi — geçerli placeholder'lar: %prefix% %player% %page% %max_pages%
AltarAC-history-header: "%prefix% &b&f%player% &biçin oturum geçmişi &8[&f%page%&7/&f%max_pages%&8]"
# Tek oturum özeti satırı — geçerli placeholder'lar:
#   %prefix% %player% %ordinal% %AltarAC_version% %server_name%
#   %client_version% %client_brand% %duration% %timeago%
#   %violations% %unique_checks% %crashed_marker%
# Bağlantısı düzgün kapanmadan kopan oturumlar (sunucu çökmesi, kill -9,
# UserDisconnectEvent tetiklemeyen channel RST gibi) için %crashed_marker%
# AltarAC-history-crashed-marker olarak genişler. Devam eden veya düzgün
# kapatılmış oturumlarda boş string olur.
AltarAC-history-session: "%prefix% &8[&b%AltarAC_version%&8] &8[&b%server_name%&8] &8[&b%client_version%&8] &bOturum &f%ordinal%&b, süre &f%duration%&b, &c%violations%&b ihlal &8[&c%unique_checks%&8]%crashed_marker% &8(&7%timeago% önce&8)"

# closed_at == last_activity olan oturumlar (yani disconnect yolu yerine bir
# sonraki başlatmanın crash-sweep'i tarafından damgalananlar) için
# %crashed_marker%'a yerleştirilen satır içi işaret. Var olduğunda doğal
# okunsun, yokken temiz kaybolsun diye başında bir boşluk içerir.
AltarAC-history-crashed-marker: " &8(&cçöktü&8)"

# Oturum detayı — geçerli placeholder'lar:
#   %prefix% %player% %ordinal% %AltarAC_version% %server_name%
#   %client_version% %client_brand% %duration% %timeago%
#   %violations% %unique_checks% %bucket_size%
AltarAC-history-detail-header: "%prefix% &b&f%player% &boyuncusunun &f%ordinal% &bnumaralı oturum detayı:"
AltarAC-history-detail-meta1: "%prefix% &bAltarAC: &f%AltarAC_version%&b, Sunucu: &f%server_name%&b, Süre: &f%duration%&b, Tarih: &7%timeago% önce"
AltarAC-history-detail-meta2: "%prefix% &bİstemci: &f%client_version%&b, Marka: &f%client_brand%"
AltarAC-history-detail-violations-header: "%prefix% &bİhlaller: &8(toplam %violations%, benzersiz %unique_checks%)"
AltarAC-history-detail-empty: "%prefix% &7- (yok)"
# Gruplanmış satır (varsayılan) — geçerli placeholder'lar: %prefix% %offset% %checks_list%
#   %checks_list%, AltarAC-history-check-count girdileri ", " ile birleştirilerek oluşur
AltarAC-history-detail-group: "%prefix% &7- %checks_list% &8(&b%offset%&8)"
# Tek ham ihlal satırı (--detailed) — geçerli placeholder'lar:
#   %prefix% %offset% %check% %vl% %verbose%
AltarAC-history-detail-entry: "%prefix% &7- &f%check% &8(&b%offset%&8)&7 %verbose%"
# %checks_list% içinde her kontrol için iç biçim — geçerli placeholder'lar: %check_name% %count%
AltarAC-history-check-count: "&f%check_name%&7 x&c%count%"

# Şema işaretçileri — bkz. config.yml'deki başlık yorumu.
config-flavor: V2
config-version: 1
