# \u00BB 表示 » (相当于缩小版的 >>), ANSI和UTF-8的显示方式有所不同,有时你甚至可以看到乱码.
prefix: "<gray>[<gradient:#FB0000:#FF874C><b>AltarAC</gradient><gray>]"

alerts-enabled: "%prefix% &f警报 已开启"
alerts-disabled: "%prefix% &f警报 已禁用"
verbose-enabled: "%prefix% &f详细警报 已开启"
verbose-disabled: "%prefix% &f详细警报 已禁用"
brands-enabled: "%prefix% &f显示客户端名牌 已开启"
brands-disabled: "%prefix% &f显示客户端名牌 已禁用"
client-brand-format: "%prefix% &f%player% 用 %brand% 加入了游戏"
console-specify-target: "%prefix% &c您必须指定一个目标作为控制台!"
reloading: "%prefix% &7重载配置中..."
reloaded: "%prefix% &f配置已经重载完毕."
reload-failed: "%prefix% &c重载配置失败."
player-not-found: "%prefix% &c指定玩家不存在或离线!"
player-not-this-server: "%prefix% &c指定玩家不在此服务器上！"
sender-not-found: "%prefix% &c如果你被豁免，则无法使用此命令！"
spectate-return: "<click:run_command:/AltarAC stopspectating><hover:show_text:\"/AltarAC stopspectating\">\n%prefix% &f点击这里返回之前的位置\n</hover></click>"
cannot-spectate-return: "%prefix% &c您只能在观看玩家后执行此操作"
cannot-run-on-self: "%prefix% &c你不能对自己使用此命令!"
upload-log: "%prefix% &f已经将日志文件上传至: %url%"
upload-log-start: "%prefix% &f上传中...请等待"
upload-log-not-found: "%prefix% &c找不到该日志."
upload-log-upload-failure: "%prefix% &c上载此日志时出错, 有关详细信息, 请参阅控制台"
disconnect:
    timeout: "<lang:disconnect.timeout>"
    closed: "<lang:disconnect.closed>"
    error: "<red>An error occurred whilst processing packets. Please contact the administrators."
    blacklisted-forge: "<red>Your forge version is blacklisted due to inbuilt reach hacks.<newline><gold>Versions affected: 1.18.2-1.19.3<newline><newline><red>Please see https://github.com/MinecraftForge/MinecraftForge/issues/9309."
run-as-player: "%prefix% &c此命令只能由玩家使用！"
run-as-player-or-console: "%prefix% &c此命令只能由玩家或控制台使用！"
webhook-not-enabled: "Discord webhooks are not enabled!"
webhook-test-message: "test message"
webhook-test-succeeded: "Discord webhook test succeeded!"
webhook-test-failed: "Discord webhook test failed!"

# 变量:
# %prefix% - 前缀
# %player% - 玩家
# %check_name% - 检查名字
# %description% - 检查的介绍
# %experimental% - 检查是否是实验性
# %vl% - VL值
# %verbose% - 检查中的额外信息说明，例如偏移量，并非所有检查都会添加信息
alerts-format: "%prefix% &f%player% &b触发了 <hover:show_text:\"&b%check_name%%experimental%\n&8描述: &f%description%\">&f%check_name%%experimental%</hover> &f(x&c%vl%&f) &7%verbose%"
alerts-format-proxy: "%prefix% &f[&cproxy&f] &f%player% &b触发了 <hover:show_text:\"&b%check_name%%experimental%\n&8描述: &f%description%\">&f%check_name%%experimental%</hover> &f(x&c%vl%&f) &7%verbose%"
experimental-symbol: "*"

profile:
    - "&7======================"
    - "%prefix% &f%player% &b 的信息"
    - "&b延迟: &f%ping%"
    - "&b版本: &f%version%"
    - "&b客户端型号: &f%brand%"
    - "&b水平灵敏度: &f%h_sensitivity%%"
    - "&b垂直灵敏度: &f%v_sensitivity%%"
    - "&bFastMath: &f%fast_math%"
    - "&7======================"
help:
    - "&7======================"
    - "/AltarAC alerts &f- &7显示/隐藏 警报"
    - "/AltarAC brands &f- &7显示/隐藏 客户端名牌"
    - "/AltarAC profile <player> &f- &7查看玩家信息"
    - "/AltarAC help &f- &7查看此帮助消息"
    - "/AltarAC debug <player> &f- &7开发者预测输出"
    - "/AltarAC perf &f- &7开发者毫秒预测"
    - "/AltarAC reload &f- &7重新加载配置"
    - "/AltarAC spectate <player> &f- &7观看玩家"
    - "/AltarAC verbose &f- &7显示无缓冲区的每个拉回"
    - "/AltarAC log [1-999] &f- &7预测标志的调试日志"
    - "/AltarAC history <player> &f- &7查看会话列表（最新优先）"
    - "/AltarAC history <player> page <N> &f- &7跳转到会话列表的第 N 页"
    - "/AltarAC history <player> session <N|latest> [-d] [-v] &f- &7查看某次会话详情（最新违规优先）"
    - "/AltarAC history <player> session <N|latest> page <N> [-d] [-v] &f- &7查看会话详情的第 N 页违规"
    - "&7======================"

# === /AltarAC history ===
# 基于会话的历史界面。下方所有行均可自定义；每个键的占位符在注释中说明。
# 会话和违规行的悬停文本由渲染器根据原始数据（verbose、检查统计）自动构建，
# 无需模板 — 但你可以在任意行加 <hover:show_text:'...'> 叠加额外提示。

AltarAC-history-load-failure: "%prefix% &c历史子系统加载失败！请检查服务器控制台中的错误。"
AltarAC-history-disabled: "%prefix% &c历史子系统已禁用！"
AltarAC-history-failed: "%prefix% &c历史加载失败：&7%error%"
AltarAC-history-unknown-player: "%prefix% &c未知玩家：&f%player%"
AltarAC-history-no-sessions: "%prefix% &7没有 &f%player% &7的会话历史。"
AltarAC-history-session-not-found: "%prefix% &c未找到 &f%player% &c的第 &f%ordinal% &c次会话。"

# 会话列表 — 可用占位符: %prefix% %player% %page% %max_pages%
AltarAC-history-header: "%prefix% &b显示 &f%player% 的会话历史 &8[&f%page%&7/&f%max_pages%&8]"
# 单条会话摘要 — 可用占位符:
#   %prefix% %player% %ordinal% %AltarAC_version% %server_name%
#   %client_version% %client_brand% %duration% %timeago%
#   %violations% %unique_checks% %crashed_marker%
# 当会话因服务器崩溃、kill -9 或未触发 UserDisconnectEvent 的连接重置而非正常关闭时，
# %crashed_marker% 会展开为 AltarAC-history-crashed-marker；正在进行或正常关闭的会话则为空字符串。
AltarAC-history-session: "%prefix% &8[&b%AltarAC_version%&8] &8[&b%server_name%&8] &8[&b%client_version%&8] &b第 &f%ordinal% &b次会话，时长 &f%duration%&b，含 &c%violations% &b次违规 &8[&c%unique_checks%&8]%crashed_marker% &8(&7%timeago% 前&8)"

# 替换到 %crashed_marker% 的内联标记：仅对 closed_at == last_activity 的会话显示
# （即由下次启动的崩溃扫描而非正常断开路径标记的会话）。包含前导空格，
# 这样存在时读起来自然，缺失时也会消失。
AltarAC-history-crashed-marker: " &8(&c崩溃&8)"

# 会话详情 — 可用占位符:
#   %prefix% %player% %ordinal% %AltarAC_version% %server_name%
#   %client_version% %client_brand% %duration% %timeago%
#   %violations% %unique_checks% %bucket_size%
AltarAC-history-detail-header: "%prefix% &b显示 &f%player% &b的第 &f%ordinal% &b次会话详情："
AltarAC-history-detail-meta1: "%prefix% &bAltarAC：&f%AltarAC_version%&b，服务器：&f%server_name%&b，时长：&f%duration%&b，时间：&7%timeago% 前"
AltarAC-history-detail-meta2: "%prefix% &b客户端：&f%client_version%&b，品牌：&f%client_brand%"
AltarAC-history-detail-violations-header: "%prefix% &b违规：&8(共 %violations% 次，独立检查 %unique_checks% 个)"
AltarAC-history-detail-empty: "%prefix% &7- (无)"
# 分组行（默认） — 可用占位符: %prefix% %offset% %checks_list%
#   %checks_list% 是用 ", " 拼接 AltarAC-history-check-count 项构成的列表
AltarAC-history-detail-group: "%prefix% &7- %checks_list% &8(&b%offset%&8)"
# 单条原始违规行（--detailed） — 可用占位符:
#   %prefix% %offset% %check% %vl% %verbose%
AltarAC-history-detail-entry: "%prefix% &7- &f%check% &8(&b%offset%&8)&7 %verbose%"
# %checks_list% 中每个检查项的内部格式 — 可用占位符: %check_name% %count%
AltarAC-history-check-count: "&f%check_name%&7 x&c%count%"

# 模式标记 — 参见 config.yml 顶部的注释。
config-flavor: V2
config-version: 1
