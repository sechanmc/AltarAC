# \u00BB é » (>> duplo), ANSI e UTF-8 interpretam isso diferentemente... você pode acabar vendo '?' por conta disso.
prefix: "<gray>[<gradient:#FB0000:#FF874C><b>AltarAC</gradient><gray>]"

alerts-enabled: "%prefix% &fAlertas habilitados."
alerts-disabled: "%prefix% &fAlertas desabilitados."
verbose-enabled: "%prefix% &fVerbose enabled"
verbose-disabled: "%prefix% &fVerbose disabled"
brands-enabled: "%prefix% &fBrands enabled"
brands-disabled: "%prefix% &fBrands disabled"
client-brand-format: "%prefix% &f%player% entrou usando %brand%."
console-specify-target: "%prefix% &cVocê deve especificar o nome do alvo!"
reloading: "%prefix% &7Reloading config..."
reloaded: "%prefix% &fConfig has been reloaded."
reload-failed: "%prefix% &cFailed to reload config."
player-not-found: "%prefix% &cJogador não encontrado!"
player-not-this-server: "%prefix% &cO jogador não está no servidor!"
sender-not-found: "%prefix% &cVocê não pode usar este comando se estiver isento!"
spectate-return: "<click:run_command:/AltarAC stopspectating><hover:show_text:\"/AltarAC stopspectating\">\n%prefix% &fClique aqui para retornar a localização anterior\n</hover></click>"
cannot-spectate-return: "%prefix% &cVocê só pode fazer isso após espectar um jogador."
cannot-run-on-self: "%prefix% &cVocê não pode usar esse comando em sí mesmo!"
upload-log: "%prefix% &fRegistro enviado para: %url%"
upload-log-start: "%prefix% &fEnviando o registro. Aguarde."
upload-log-not-found: "%prefix% &cNúmero do registro não encontrado."
upload-log-upload-failure: "%prefix% &cAlgo deu errado ao enviar o registro, veja o terminal para mais informações."
disconnect:
    timeout: "<lang:disconnect.timeout>"
    closed: "<lang:disconnect.closed>"
    error: "<red>An error occurred whilst processing packets. Please contact the administrators."
    blacklisted-forge: "<red>Your forge version is blacklisted due to inbuilt reach hacks.<newline><gold>Versions affected: 1.18.2-1.19.3<newline><newline><red>Please see https://github.com/MinecraftForge/MinecraftForge/issues/9309."
run-as-player: "%prefix% &cEste comando só pode ser usado por jogadores!"
run-as-player-or-console: "%prefix% &cEste comando só pode ser usado por jogadores ou pelo console!"
webhook-not-enabled: "Discord webhooks are not enabled!"
webhook-test-message: "test message"
webhook-test-succeeded: "Discord webhook test succeeded!"
webhook-test-failed: "Discord webhook test failed!"

# Placeholders válidos:
# %prefix%
# %player%
# %check_name%
# %experimental%
# %vl% - violações
# %verbose% - Informação extra da verificação, como os desalinhamentos, nem todas as verifiações terão essa informação.
alerts-format: "%prefix% &f%player% &bfalhou em <hover:show_text:\"&b%check_name%%experimental%\n&8Descrição: &f%description%\">&f%check_name%%experimental%</hover> &f(x&c%vl%&f) &7%verbose%"
alerts-format-proxy: "%prefix% &f[&cproxy&f] &f%player% &bfalhou em <hover:show_text:\"&b%check_name%%experimental%\n&8Descrição: &f%description%\">&f%check_name%%experimental%</hover> &f(x&c%vl%&f) &7%verbose%"
experimental-symbol: "*"
profile:
    - "&7======================"
    - "%prefix% &bPerfil de &f%player%"
    - "&bPing: &f%ping%"
    - "&bVersão: &f%version%"
    - "&bNome do Cliente: &f%brand%"
    - "&bSensibilidade Horizontal: &f%h_sensitivity%%"
    - "&bSensibilidade Vertical: &f%v_sensitivity%%"
    - "&bFastMath: &f%fast_math%"
    - "&7======================"
help:
    - "&7======================"
    - "/AltarAC alerts &f- &7Alterna noificações."
    - "/AltarAC brands &f- &7Toggle brands"
    - "/AltarAC profile <player> &f- &7Mosta as informações do jogador."
    - "/AltarAC help &f- &7Mostra essa mensagem de ajuda."
    - "/AltarAC debug <player> &f- &7Depura a simulação."
    - "/AltarAC perf &f- &7Depura a performance."
    - "/AltarAC reload &f- &7Recarrega as configurações."
    - "/AltarAC spectate <player> &f- &7Especta um jogador."
    - "/AltarAC verbose &f- &7Esconde as informações extra."
    - "/AltarAC log [0-255] &f- &7Envia o registro da simulação."
    - "/AltarAC history <player> &f- &7Lista de sessões (mais recentes primeiro)"
    - "/AltarAC history <player> page <N> &f- &7Pular para a página N da lista de sessões"
    - "/AltarAC history <player> session <N|latest> [-d] [-v] &f- &7Detalhe da sessão (violações mais recentes primeiro)"
    - "/AltarAC history <player> session <N|latest> page <N> [-d] [-v] &f- &7Detalhe da sessão, página N de violações"
    - "&7======================"

# === /AltarAC history ===
# UI de histórico baseada em sessões. Todas as linhas abaixo são totalmente
# configuráveis; os placeholders estão documentados em cada chave. O texto de
# hover das linhas de sessão e violação é construído pelo renderer a partir
# dos dados brutos (verbose, divisão de checks) e não precisa de template —
# mas você pode adicionar <hover:show_text:'...'> a qualquer linha para
# sobrepor tooltips adicionais.

AltarAC-history-load-failure: "%prefix% &cO subsistema de histórico falhou ao carregar! Verifique o console do servidor por erros."
AltarAC-history-disabled: "%prefix% &cO subsistema de histórico está desativado!"
AltarAC-history-failed: "%prefix% &cFalha ao carregar o histórico: &7%error%"
AltarAC-history-unknown-player: "%prefix% &cJogador desconhecido: &f%player%"
AltarAC-history-no-sessions: "%prefix% &7Sem histórico de sessões para &f%player%&7."
AltarAC-history-session-not-found: "%prefix% &cSessão &f%ordinal%&c não encontrada para &f%player%&c."

# Lista de sessões — placeholders válidos: %prefix% %player% %page% %max_pages%
AltarAC-history-header: "%prefix% &bMostrando histórico de sessões de &f%player% &8[&f%page%&7/&f%max_pages%&8]"
# Linha de resumo de sessão — placeholders válidos:
#   %prefix% %player% %ordinal% %AltarAC_version% %server_name%
#   %client_version% %client_brand% %duration% %timeago%
#   %violations% %unique_checks% %crashed_marker%
# %crashed_marker% expande para AltarAC-history-crashed-marker em sessões cuja
# conexão caiu sem fechamento limpo (queda do servidor, kill -9, RST de canal
# que não disparou UserDisconnectEvent). String vazia para sessões em curso
# ou encerradas normalmente.
AltarAC-history-session: "%prefix% &8[&b%AltarAC_version%&8] &8[&b%server_name%&8] &8[&b%client_version%&8] &bSessão &f%ordinal%&b, duração &f%duration%&b, com &c%violations%&b violações &8[&c%unique_checks%&8]%crashed_marker% &8(&7há %timeago%&8)"

# Marcador inline substituído em %crashed_marker% para sessões cujo
# closed_at == last_activity (ou seja, marcadas pelo varrimento de queda no
# próximo arranque, não pelo caminho de desconexão). Inclui um espaço inicial
# para que o marcador leia naturalmente quando presente e desapareça
# limpamente quando vazio.
AltarAC-history-crashed-marker: " &8(&cqueda&8)"

# Detalhe de sessão — placeholders válidos:
#   %prefix% %player% %ordinal% %AltarAC_version% %server_name%
#   %client_version% %client_brand% %duration% %timeago%
#   %violations% %unique_checks% %bucket_size%
AltarAC-history-detail-header: "%prefix% &bDetalhe da sessão &f%ordinal% &bde &f%player%&b:"
AltarAC-history-detail-meta1: "%prefix% &bAltarAC: &f%AltarAC_version%&b, Servidor: &f%server_name%&b, Duração: &f%duration%&b, Data: &7há %timeago%"
AltarAC-history-detail-meta2: "%prefix% &bCliente: &f%client_version%&b, Marca: &f%client_brand%"
AltarAC-history-detail-violations-header: "%prefix% &bViolações: &8(%violations% no total, %unique_checks% únicas)"
AltarAC-history-detail-empty: "%prefix% &7- (nenhuma)"
# Linha agrupada (padrão) — placeholders válidos: %prefix% %offset% %checks_list%
#   %checks_list% é construída unindo entradas AltarAC-history-check-count com ", "
AltarAC-history-detail-group: "%prefix% &7- %checks_list% &8(&b%offset%&8)"
# Linha de violação bruta (--detailed) — placeholders válidos:
#   %prefix% %offset% %check% %vl% %verbose%
AltarAC-history-detail-entry: "%prefix% &7- &f%check% &8(&b%offset%&8)&7 %verbose%"
# Formato interno por check em %checks_list% — placeholders válidos: %check_name% %count%
AltarAC-history-check-count: "&f%check_name%&7 x&c%count%"

# Marcadores de esquema — ver o comentário do cabeçalho em config.yml.
config-flavor: V2
config-version: 1
