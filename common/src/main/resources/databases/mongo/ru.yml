# ===========================================================================
#  Настройки бекенда MongoDB.
#
#  В рантайме нужен синхронный драйвер MongoDB; если он отсутствует,
#  бекенд сам отключается, а маршрут переключается на запасной.
# ===========================================================================

# Все ключи лежат под `mongo:`, чтобы пространство имён этого файла не
# конфликтовало с соседними файлами других бекендов, когда Configuralize
# объединяет их в общий namespace.
mongo:
  # Connection string MongoDB. Учётные данные кодируются в URL согласно
  # стандарту драйвера
  # (mongodb://user:pass@host:port/?authSource=admin).
  connection-string: "mongodb://localhost:27017"

  # База данных для записи. Имена коллекций внутри задаются блоком
  # `tables:` ниже.
  database: "AltarAC"

  # Размер bulkWrite() на хендлер. Драйвер Mongo сам пулит соединения —
  # этот параметр управляет батчингом коммитов, а не числом соединений.
  batch-flush-cap: 256

  # Переопределения имён коллекций. Значения по умолчанию ниже.
  tables:
    meta: AltarAC_meta
    checks: AltarAC_checks
    players: AltarAC_players
    sessions: AltarAC_sessions
    violations: AltarAC_violations
    settings: AltarAC_settings

# Маркеры схемы — см. шапку config.yml.
config-flavor: V2
config-version: 1
