# ===========================================================================
#  Redis バックエンド設定
#
#  Redis は主にインメモリストアです。ここに履歴をルーティングする場合は、
#  サーバー側で AOF 永続化を有効にしてください。さもなくば再起動で履歴が
#  消えます。実行時に Jedis が必要で、Jedis が無いと自己無効化し、
#  ルーティングはフォールバックに切り替わります。
#
#  履歴の主目的の保存先としては推奨しません。手元に Redis しかなく、
#  とりあえず動くものが必要なオペレーター向けです。
# ===========================================================================

# すべてのキーは `redis:` の下に置きます。これにより、Configuralize が
# すべてを 1 つのグローバル名前空間にマージしても、兄弟のバックエンド
# ファイルと keyspace が衝突しません。
redis:
  host: "localhost"
  port: 6379

  # 論理データベースインデックス（既定で 0–15）。
  database: 0

  # 任意の ACL 資格情報。認証無し Redis では空のままにします。
  user: ""
  password: ""

  # このバックエンドが書き込むすべてのキーに前置されます。Redis インスタンスを
  # 他のアプリと共有しているときに便利です。プレフィックスを付けない
  # 場合は空のまま。
  key-prefix: ""

  timeout-ms: 2000
  batch-flush-cap: 256

  # true にすると、このバックエンドが violation／session の履歴を扱う
  # 場合、起動時に警告をログ出力します。永続化設定を確認できたら
  # false にして黙らせてください。
  warn-on-history: true

  # キーの名前空間上書き。キーのプレフィックスセグメントとして解釈
  # されます（Redis にはネイティブのテーブル概念がありません）。
  # デフォルト値は以下の通り。
  tables:
    meta: AltarAC_meta
    checks: AltarAC_checks
    players: AltarAC_players
    sessions: AltarAC_sessions
    violations: AltarAC_violations
    settings: AltarAC_settings

# スキーマ用マーカー — config.yml のヘッダーコメントを参照。
config-flavor: V2
config-version: 1
