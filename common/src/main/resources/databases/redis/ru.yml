# ===========================================================================
#  Настройки бекенда Redis.
#
#  Redis в первую очередь — in-memory store. Если вы маршрутизируете
#  историю сюда, убедитесь, что на сервере включена персистенция AOF,
#  иначе история исчезнет при перезапуске. В рантайме требуется Jedis;
#  если Jedis отсутствует, бекенд сам отключается, а маршрут переходит
#  на запасной.
#
#  Как основное место хранения истории не рекомендуется. Предназначен
#  для операторов, у которых есть только Redis, и им нужно решение,
#  которое просто работает.
# ===========================================================================

# Все ключи лежат под `redis:`, чтобы пространство имён этого файла не
# конфликтовало с соседними файлами других бекендов, когда Configuralize
# объединяет их в общий namespace.
redis:
  host: "localhost"
  port: 6379

  # Логический индекс базы (по умолчанию 0–15).
  database: 0

  # Необязательные ACL-учётные данные. Оставьте пустым для Redis без
  # авторизации.
  user: ""
  password: ""

  # Префикс, добавляемый к каждому ключу, который пишет этот бекенд.
  # Полезен при совместном использовании Redis с другими приложениями.
  # Оставьте пустым, если префикс не нужен.
  key-prefix: ""

  timeout-ms: 2000
  batch-flush-cap: 256

  # Если true — пишет предупреждение при старте, когда этот бекенд
  # обслуживает историю violation/session. Поставьте false, когда
  # подтвердили, что персистенция настроена.
  warn-on-history: true

  # Переопределения namespace ключей. Интерпретируются как сегменты
  # префикса ключа (нативных таблиц у Redis нет). Значения по умолчанию
  # ниже.
  tables:
    meta: AltarAC_meta
    checks: AltarAC_checks
    players: AltarAC_players
    sessions: AltarAC_sessions
    violations: AltarAC_violations
    settings: AltarAC_settings

# Маркеры схемы — см. шапку config.yml.
config-flavor: V2
config-version: 1
