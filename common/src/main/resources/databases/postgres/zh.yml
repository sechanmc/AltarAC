# ===========================================================================
#  Postgres 后端设置
#
#  Postgres 支持多服务器部署（多个 AltarAC 实例写入同一个中央数据库）。
#  运行时需要 Postgres JDBC 驱动；若驱动缺失，后端会在启动时自我禁用，
#  指向此后端的路由会回退到其他已配置的后端。
# ===========================================================================

# 所有键都在 `postgres:` 下，使本文件的 keyspace 不会在 Configuralize 把
# 所有 yml 合并到同一个全局命名空间时与其他后端文件冲突。
postgres:
  host: "localhost"
  port: 5432
  database: "AltarAC"
  user: "postgres"
  password: ""

  # 在 `?` 之后追加的额外 URL 参数。除非确有特殊需要，否则保持为空。
  extra-jdbc-params: ""

  batch-flush-cap: 256

  # 表名覆盖。默认值见下方。
  tables:
    meta: AltarAC_meta
    checks: AltarAC_checks
    players: AltarAC_players
    sessions: AltarAC_sessions
    violations: AltarAC_violations
    settings: AltarAC_settings

# 模式标记 — 参见 config.yml 顶部的注释。
config-flavor: V2
config-version: 1
