# ===========================================================================
#  Impostazioni del backend Postgres.
#
#  Postgres supporta deployment multi-server (più istanze AltarAC che
#  scrivono in un DB centrale). Richiede il driver JDBC Postgres a
#  runtime; se manca, il backend si disabilita all'avvio e il routing che
#  puntava qui ricade sul suo fallback.
# ===========================================================================

# Tutte le chiavi vivono sotto `postgres:` così il keyspace di questo file
# non collide con i file fratelli per backend quando Configuralize li
# unisce in un namespace globale.
postgres:
  host: "localhost"
  port: 5432
  database: "AltarAC"
  user: "postgres"
  password: ""

  # Parametri URL extra appesi dopo `?`. Lascia vuoto se non hai bisogno
  # di qualcosa di specifico.
  extra-jdbc-params: ""

  batch-flush-cap: 256

  # Override dei nomi tabella. Default sotto.
  tables:
    meta: AltarAC_meta
    checks: AltarAC_checks
    players: AltarAC_players
    sessions: AltarAC_sessions
    violations: AltarAC_violations
    settings: AltarAC_settings

# Marcatori di schema — vedi il commento di intestazione in config.yml.
config-flavor: V2
config-version: 1
