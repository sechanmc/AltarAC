# ===========================================================================
#  Настройки бекенда Postgres.
#
#  Postgres поддерживает мультисерверные развёртывания (несколько
#  экземпляров AltarAC пишут в одну центральную БД). Требует драйвер JDBC
#  Postgres в рантайме; если драйвера нет, бекенд сам отключается на
#  старте, а маршрут, ссылавшийся сюда, переключается на запасной.
# ===========================================================================

# Все ключи лежат под `postgres:`, чтобы пространство имён этого файла не
# конфликтовало с соседними файлами других бекендов, когда Configuralize
# объединяет их в общий namespace.
postgres:
  host: "localhost"
  port: 5432
  database: "AltarAC"
  user: "postgres"
  password: ""

  # Дополнительные URL-параметры, дописываемые после `?`. Оставьте
  # пустым, если нет специфической необходимости.
  extra-jdbc-params: ""

  batch-flush-cap: 256

  # Переопределения имён таблиц. Значения по умолчанию ниже.
  tables:
    meta: AltarAC_meta
    checks: AltarAC_checks
    players: AltarAC_players
    sessions: AltarAC_sessions
    violations: AltarAC_violations
    settings: AltarAC_settings

# Маркеры схемы — см. шапку config.yml.
config-flavor: V2
config-version: 1
