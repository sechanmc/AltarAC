# ===========================================================================
#  SQLite バックエンド設定
#
#  SQLite はシングルサーバー専用です。ネットワーク構成では database.yml の
#  routing を、共有データベースと通信する別のバックエンドに切り替えてください。
# ===========================================================================

# すべてのキーは `sqlite:` の下に置きます。これにより、Configuralize が
# すべてを 1 つのグローバル名前空間にマージしても、兄弟のバックエンド
# ファイル（mysql:、postgres:、mongo:、redis:）と keyspace が衝突しません。
sqlite:
  # SQLite データベースファイルのパス。絶対パスでない場合はプラグインの
  # データフォルダからの相対パスとして解決されます。既存の
  # `data/violations.sqlite` はセーフティネットとしてそのまま残します。
  # これは常に新しいファイルで、レガシー側の ALTER ではありません。
  path: "data/history.v1.db"

  # WAL モードは、ライターと並行して読み取り側を動かせます — /AltarAC history
  # を読みながら違反を書き込むサーバープラグインには必須です。
  journal-mode: WAL

  # NORMAL は WAL 下で書き込みの耐久性とスループットのバランスが取れた値です。
  # FULL は耐久性を倍にする代わりにスループットを下げます。OFF は危険です。
  synchronous-mode: NORMAL

  # SQLite がロック取得を諦めるまでの待機時間。ハンドラは BackendException で
  # ログを残してドロップします。値を上げると競合の激しいディスクでの
  # 不要なドロップが減ります。
  busy-timeout-ms: 5000

  # ページキャッシュサイズ（ページ単位）。デフォルトのページサイズは
  # 4096 バイトなので 10000 ページ ≒ 40 MB。アクセスが集中する履歴では
  # 値を増やしてください。
  cache-pages: 10000

  # ハンドラごとのバッチフラッシュ上限。各リングハンドラは PreparedStatement の
  # バッチにイベントをためて、endOfBatch かバッチがこの上限に達した
  # タイミングのいずれか早い方でコミットします。値が大きいほど、持続的な
  # バーストでスループット側に倒します（レイテンシは増加します）。
  batch-flush-cap: 256

# スキーマ用マーカー — config.yml のヘッダーコメントを参照。
config-flavor: V2
config-version: 1
