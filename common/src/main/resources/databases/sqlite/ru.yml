# ===========================================================================
#  Настройки бекенда SQLite.
#
#  SQLite предназначен только для односерверных установок. В сетевых
#  конфигурациях переключите routing в database.yml на бекенд, говорящий
#  с общей базой данных.
# ===========================================================================

# Все ключи лежат под `sqlite:`, чтобы пространство имён этого файла не
# конфликтовало с соседними файлами других бекендов (mysql:, postgres:,
# mongo:, redis:), когда Configuralize объединяет их в общий namespace.
sqlite:
  # Путь к файлу базы данных SQLite. Если путь не абсолютный, разрешается
  # относительно папки данных плагина. Старый файл
  # `data/violations.sqlite` остаётся нетронутым как страховка; это
  # новый файл, а не ALTER старого.
  path: "data/history.v1.db"

  # Режим WAL позволяет параллельным читателям работать рядом с
  # писателем — это критично для серверного плагина, который читает
  # /AltarAC history одновременно с записью нарушений.
  journal-mode: WAL

  # NORMAL — разумный баланс между долговечностью записи и пропускной
  # способностью под WAL. FULL удваивает долговечность ценой
  # пропускной способности. OFF опасен.
  synchronous-mode: NORMAL

  # Сколько SQLite ждёт лок, прежде чем сдаться. Хендлер логирует и
  # дропает на BackendException; увеличение значения снижает ложные
  # дропы на дисках с большой конкуренцией.
  busy-timeout-ms: 5000

  # Размер кэша страниц (в страницах). Размер страницы SQLite по
  # умолчанию 4096 байт, то есть 10000 страниц ≈ 40 МБ. Увеличьте для
  # «горячих» историй.
  cache-pages: 10000

  # Потолок batch-flush на хендлер. Каждый ring-хендлер копит события в
  # batch PreparedStatement и коммитит на endOfBatch ИЛИ при достижении
  # этого потолка — что наступит раньше. Большие значения меняют
  # задержку на пропускную способность при устойчивых всплесках.
  batch-flush-cap: 256

# Маркеры схемы — см. шапку config.yml.
config-flavor: V2
config-version: 1
